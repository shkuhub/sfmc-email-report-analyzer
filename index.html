<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이메일 발송 분석 리포트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #F2F4F6; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; }

    /* 기존 테이블 스타일 */
    .rtable { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .rtable th {
      background: #F9FAFB; padding: 13px 16px; font-size: 12px;
      font-weight: 600; color: #8B95A1; text-align: center;
      letter-spacing: 0.04em; white-space: nowrap; border-bottom: 1px solid #E5E8EC;
    }
    .rtable td {
      padding: 15px 16px; font-size: 13px; color: #333D4B;
      vertical-align: middle; border-bottom: 1px solid #F2F4F6;
    }
    .td-cat {
      text-align: center !important; font-weight: 700; font-size: 12px !important;
      letter-spacing: 0.03em; background: #FAFAFA; white-space: nowrap;
      border-right: 2px solid #E5E8EC !important;
    }
    .td-lbl  { text-align: left !important;  border-right: 1px solid #F2F4F6 !important; }
    .td-lbl-i { text-align: left !important; padding-left: 26px !important;
      color: #B8BFC8 !important; border-right: 1px solid #F2F4F6 !important; }
    .td-num  { text-align: center !important; font-variant-numeric: tabular-nums;
      border-right: 1px solid #F2F4F6 !important; }
    .td-rate { text-align: center !important; font-variant-numeric: tabular-nums;
      font-weight: 700; border-right: 1px solid #F2F4F6 !important; }
    .td-note { text-align: center !important; font-size: 12px !important; color: #8B95A1 !important; }
    .sec-top { border-top: 2px solid #E5E8EC !important; }
    .faint   { color: #C4C9D0 !important; }
    .bold    { font-weight: 700; }

    /* 버튼 */
    .retry-btn {
      background: #fff; border: 1px solid #E5E8EC; border-radius: 10px;
      padding: 7px 16px; font-size: 12px; font-weight: 600; color: #333D4B;
      cursor: pointer; font-family: inherit; transition: background 0.12s;
    }
    .retry-btn:hover { background: #F9FAFB; }

    /* 편집 가능 셀 hover */
    .td-editable:hover { background: #F5F7FA !important; cursor: text; }
    .td-editable:hover input { background: #F5F7FA !important; }

    .raw-toggle {
      font-size: 11px; color: #B8BFC8; cursor: pointer; text-decoration: underline;
      background: none; border: none; font-family: inherit; margin-top: 4px; display: block;
    }
    .raw-box {
      margin: 6px 12px 10px; background: #F9FAFB; border: 1px solid #E5E8EC;
      border-radius: 10px; padding: 10px; font-size: 11px; color: #8B95A1;
      white-space: pre-wrap; max-height: 120px; overflow-y: auto;
    }

    /* 슬롯 카드 */
    .slot-card {
      flex: 1; min-width: 0; background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
      display: flex; flex-direction: column; position: relative;
      min-height: 130px;
    }
    .slot-header {
      padding: 14px 14px 10px; flex: 1;
      display: flex; flex-direction: column; gap: 6px;
    }

    /* 추가 카드 및 빈 자리 */
    .add-slot-card {
      flex: 1; min-width: 0; background: #F9FAFB;
      border: 2px dashed #E5E8EC; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; cursor: pointer;
      min-height: 130px; transition: all 0.15s; color: #B8BFC8;

    .add-slot-card:hover { background: #F2F4F6; border-color: #C4C9D0; color: #8B95A1; }
    .empty-slot {
      flex: 1; min-width: 0; border-radius: 16px;
      background: #FAFAFA; border: 1.5px dashed #EBEBEB;
      min-height: 130px;
    }

    /* 합산 배지 */
    .sum-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #EEF2FF; border: 1px solid #C7D2FE;
      border-radius: 100px; padding: 4px 12px;
      font-size: 11px; font-weight: 700; color: #4F46E5;
      margin-bottom: 14px;
    }

    /* 텍스트 입력 영역 및 분석 버튼 */
    .paste-textarea {
      width: 100%; min-height: 200px; padding: 16px;
      border: 1.5px solid #E5E8EC; border-radius: 14px;
      font-size: 13px; font-family: 'Noto Sans KR', monospace;
      color: #333D4B; background: #FAFAFA; resize: vertical;
      outline: none; transition: border-color 0.15s, background 0.15s;
      line-height: 1.6;
    }
    .paste-textarea:focus { border-color: #333D4B; background: #fff; }
    .paste-textarea::placeholder { color: #C4C9D0; }
    .analyze-btn {
      background: #333D4B; color: #fff; border: none; border-radius: 12px;
      padding: 13px 28px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s;
    }
    .analyze-btn:hover { background: #1E2530; }
    .analyze-btn:active { transform: scale(0.97); }
    .analyze-btn:disabled { background: #C4C9D0; cursor: not-allowed; }

    /* 모달 */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(242,244,246,0.92); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: #fff; border-radius: 24px; padding: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14); width: 100%; max-width: 560px;
    }

    /* 요약 표 스타일 */
    .summary-section { margin-bottom: 30px; }
    .summary-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .summary-title { font-size: 16px; font-weight: 800; color: #333D4B; }
    .copy-btn {
      background: #F2F4F6; border: none; border-radius: 6px; padding: 6px 12px;
      font-size: 11px; font-weight: 600; color: #4F46E5; cursor: pointer; transition: background 0.15s;
    }
    .copy-btn:hover { background: #E5E8EC; }
    
    .stable { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 24px; }
    .stable th { background: #F9FAFB; padding: 10px; font-size: 11px; color: #8B95A1; border: 1px solid #F2F4F6; text-align: center; white-space: nowrap; }
    .stable td { padding: 10px; font-size: 12px; color: #333D4B; border: 1px solid #F2F4F6; text-align: center; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .bg-light { background: #FAFAFA; font-weight: 600; }

    /* CSV 멀티 태그 선택 및 합계행 스타일 */
    .bg-total { background: #F2F4F6; font-weight: 800; color: #4F46E5 !important; }
    .tag-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px; background: #FAFAFA; border-radius: 10px; border: 1px solid #E5E8EC; margin-bottom: 16px; max-height: 120px; overflow-y: auto; }
    .tag-item { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; background: #fff; border: 1px solid #E5E8EC; font-size: 11px; cursor: pointer; transition: all 0.1s; }
    .tag-item.active { background: #333D4B; color: #fff; border-color: #333D4B; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const MAX_SLOTS = 3;

/* ─────────────────────── 공통 이미지 다운로드 함수 ─────────────────────── */
const downloadImage = (elementId, filename) => {
  const el = document.getElementById(elementId);
  if (!el) return;
  
  // 모서리나 그림자 잘림 방지 설정 및 고해상도 처리
  window.html2canvas(el, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
    
    // 1. 브라우저로 PNG 파일 다운로드
    const link = document.createElement('a');
    link.download = filename + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    // 2. 클립보드에 이미지 복사 (최신 브라우저 지원)
    canvas.toBlob(blob => {
      if (blob) {
        try {
          const item = new ClipboardItem({ 'image/png': blob });
          navigator.clipboard.write([item]).then(() => {
            alert('이미지 저장 완료!, 클립보드에도 복사되었습니다!\n(Ctrl+V로 바로 붙여넣기 가능)');
          }).catch(err => {
            console.error('클립보드 에러:', err);
            alert('이미지는 저장되었으나, 브라우저 권한 문제로 클립보드 복사는 실패했습니다.');
          });
        } catch (err) {
          // ClipboardItem API 미지원 브라우저인 경우
          console.error('Clipboard API 에러:', err);
        }
      }
    }, 'image/png');
  });
};

/* ─────────────────────── CSV 파서 ─────────────────────── */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return null;
  const headers = lines[0].split(',').map(h => h.trim());
  if (!headers.includes('groupTag') || !headers.includes('date')) return null;

  const data = lines.slice(1).map(line => {
    const matches = line.match(/(".*?"|[^,]+)/g);
    if (!matches) return null;
    const row = {};
    headers.forEach((h, i) => {
      let val = matches[i] ? matches[i].replace(/"/g, '').trim() : '';
      if (['successCount', 'validFailCount', 'readCount', 'button1', 'button2', 'image1'].includes(h)) {
        val = parseInt(val.replace(/,/g, ''), 10) || 0;
      }
      row[h] = val;
    });
    return row;
  }).filter(Boolean);
  return { type: 'CSV', data, tags: [...new Set(data.map(d => d.groupTag))] };
}

/* ─────────────────────── 리포트 합산 ─────────────────────── */
function mergeReports(reports) {
  function sumNull(...vals) {
    const nums = vals.filter(v => v !== null && v !== undefined);
    return nums.length > 0 ? nums.reduce((a, b) => a + b, 0) : null;
  }
  return {
    publishedOn: reports.map(r => r.publishedOn).filter(Boolean).join(', '),
    campaignName: reports.map(r => r.campaignName).filter(Boolean).join(' / '),
    totalSent:   sumNull(...reports.map(r => r.totalSent)),
    delivered:   sumNull(...reports.map(r => r.delivered)),
    deliveryRate: null,
    bounces: {
      total: sumNull(...reports.map(r => r.bounces?.total)),
      hard:  sumNull(...reports.map(r => r.bounces?.hard)),
      soft:  sumNull(...reports.map(r => r.bounces?.soft)),
      block: sumNull(...reports.map(r => r.bounces?.block)),
    },
    opens: {
      total:  sumNull(...reports.map(r => r.opens?.total)),
      unique: sumNull(...reports.map(r => r.opens?.unique)),
    },
    clicks: {
      total:  sumNull(...reports.map(r => r.clicks?.total)),
      unique: sumNull(...reports.map(r => r.clicks?.unique)),
    },
    conversions: {
      total:  sumNull(...reports.map(r => r.conversions?.total)),
      unique: sumNull(...reports.map(r => r.conversions?.unique)),
    },
    unsubscribes: {
      total:  sumNull(...reports.map(r => r.unsubscribes?.total)),
      unique: sumNull(...reports.map(r => r.unsubscribes?.unique)),
    },
    didNotOpen:  sumNull(...reports.map(r => r.didNotOpen)),
    didNotClick: sumNull(...reports.map(r => r.didNotClick)),
    conversionAmount: sumNull(...reports.map(r => r.conversionAmount)),
  };
}

/* ─────────────────────── 텍스트 파서 ─────────────────────── */
function parseReport(rawText) {
  const t = rawText
    .replace(/\r\n/g, '\n')
    .replace(/[\u00a0]+/g, ' ')
    .replace(/__([0-9,\s]+)__/g, (_, n) => n.trim())
    .replace(/(\d)\s*,\s*(\d)/g, '$1,$2');

  function num(str) {
    if (!str) return null;
    const n = parseInt(str.replace(/,/g, '').replace(/\s/g, ''), 10);
    return isNaN(n) ? null : n;
  }
  function find(patterns) {
    for (const pat of patterns) {
      const m = t.match(pat);
      if (m && m[1]) return m[1].trim();
    }
    return null;
  }
  function findNum(patterns) { return num(find(patterns)); }

  const campaignName = find([
    /Name\s*:\s*([^\n]+)/i,
    /AT\s+Enhanced[^\n]*/i,
  ]) || '';

  const publishedOn = find([
    /Last\s+Published\s+On\s*:\s*([0-9]{4}-[0-9]{1,2}-[0-9]{1,2}[^\n]*)/i,
    /Published\s+On\s*:\s*([0-9]{4}-[0-9]{1,2}-[0-9]{1,2}[^\n]*)/i,
    /Last\s+Published\s+On\s*:\s*([0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4}[^\n]*)/i,
    /Published\s+On\s*:\s*([0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4}[^\n]*)/i,
  ]) || '';

  const totalSent = findNum([
    /Total\s+Sent\s*:\s*([0-9,]+)/i,
    /Total\s+Sent[^\d]+([0-9,]+)/i,
  ]);

  const delivered = findNum([
    /Delivered\s*:\s*([0-9,]+)/i,
    /Delivered\s+([0-9,]+)/i,
  ]);

  const drMatch = t.match(/Delivery\s+Rate\s*:\s*([0-9.]+)%/i);
  const deliveryRate = drMatch ? parseFloat(drMatch[1]) : null;

  const bounceTotal = findNum([/Total\s+Bounces?\s*:\s*([0-9,]+)/i, /Total\s+Bounces?\s+([0-9,]+)/i]);
  const bounceHard  = findNum([/Hard\s+Bounce\s*:\s*([0-9,]+)/i,  /Hard\s+Bounce\s+([0-9,]+)/i]);
  const bounceSoft  = findNum([/Soft\s+Bounce\s*:\s*([0-9,]+)/i,  /Soft\s+Bounce\s+([0-9,]+)/i]);
  const bounceBlock = findNum([/Block\s+Bounce\s*:\s*([0-9,]+)/i, /Block\s+Bounce\s+([0-9,]+)/i]);

  const totalOpensDirect  = findNum([/Total\s+Opens?\s*:\s*([0-9,]+)/i]);
  const uniqueOpensDirect = findNum([/Unique\s+Opens?\s*:\s*([0-9,]+)/i]);

  let opensTotalInbox = null, opensUniqueInbox = null;
  const openRowMatch = t.match(/Opens?\s+([0-9,]+)\s+([0-9,]+)/i);
  if (openRowMatch) { opensTotalInbox = num(openRowMatch[1]); opensUniqueInbox = num(openRowMatch[2]); }

  const opensTotal  = totalOpensDirect  ?? opensTotalInbox;
  const opensUnique = uniqueOpensDirect ?? opensUniqueInbox;

  let clicksTotal = null, clicksUnique = null;
  const clickRowMatch = t.match(/Clicks?\s+([0-9,]+)\s+([0-9,]+)/i);
  if (clickRowMatch) { clicksTotal = num(clickRowMatch[1]); clicksUnique = num(clickRowMatch[2]); }

  let convTotal = null, convUnique = null;
  const convRowMatch = t.match(/Conversions?\s+([0-9,]+)\s+([0-9,]+)/i);
  if (convRowMatch) { convTotal = num(convRowMatch[1]); convUnique = num(convRowMatch[2]); }
  const convSingleTotal  = findNum([/Total\s+Conversions?\s*:\s*([0-9,]+)/i]);
  convTotal  = convTotal  ?? convSingleTotal;

  let unsubTotal = null, unsubUnique = null;
  const unsubRowMatch = t.match(/Unsubscribes?\s+[-–—]?\s*([0-9,]+)\s+([0-9,]+)/i);
  if (unsubRowMatch) { unsubTotal = num(unsubRowMatch[1]); unsubUnique = num(unsubRowMatch[2]); }
  const unsubSingle = findNum([/Unsubscribes?\s+[-–—]\s*([0-9,]+)/i, /Unsubscribe[:\s]+([0-9,]+)/i]);
  unsubUnique = unsubUnique ?? unsubSingle;

  const didNotOpen  = findNum([/Did\s+not\s+open\s+([0-9,]+)/i,  /not\s+open[:\s]+([0-9,]+)/i]);
  const didNotClick = findNum([/Did\s+not\s+click\s+([0-9,]+)/i, /not\s+click[:\s]+([0-9,]+)/i]);

  return {
    campaignName, publishedOn,
    totalSent, delivered, deliveryRate,
    bounces: { total: bounceTotal, hard: bounceHard, soft: bounceSoft, block: bounceBlock },
    opens:   { total: opensTotal,  unique: opensUnique },
    clicks:  { total: clicksTotal, unique: clicksUnique },
    conversions:  { total: convTotal,  unique: convUnique },
    unsubscribes: { total: unsubTotal, unique: unsubUnique },
    didNotOpen, didNotClick,
    conversionAmount: null,
  };
}

/* ─────────────────────── 유틸 ─────────────────────── */
function toKoreanDate(raw) {
  if (!raw) return null;
  const DAYS = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
  const datePart = raw.trim().split(" ")[0];
  
  if (datePart.includes("-")) {
    const parts = datePart.split("-").map(Number);
    if (parts.length === 3 && !isNaN(parts[0])) {
      const dt = new Date(parts[0], parts[1]-1, parts[2]);
      return `${parts[0]}년 ${parts[1]}월 ${parts[2]}일 ${DAYS[dt.getDay()]}`;
    }
  }

  const parts = datePart.split("/").map(Number);
  if (parts.length !== 3) return raw;
  let d, m, y;
  if (parts[2] > 1000) { [d, m, y] = parts; }
  else { [m, d, y] = parts; }
  if (isNaN(d)||isNaN(m)||isNaN(y)) return raw;
  const dt = new Date(y, m-1, d);
  return `${y}년 ${m}월 ${d}일 ${DAYS[dt.getDay()]}`;
}
function fmt(n) {
  if (n === null || n === undefined) return null;
  return n.toLocaleString("ko-KR");
}
function calcRate(num, den, decimals=2) {
  if (num==null||!den) return null;
  return ((num/den)*100).toFixed(decimals)+"%";
}

/* ─────────────────────── EditableNum ─────────────────────── */
function EditableNum({ value, onSave, bold, faint, secTop }) {
  const [editing, setEditing] = React.useState(false);
  const [draft,   setDraft]   = React.useState("");
  const inputRef = useRef();

  function startEdit() {
    if(faint) return;
    setDraft(value !== null && value !== undefined ? String(value) : "");
    setEditing(true);
  }
  React.useEffect(() => { if (editing) inputRef.current?.select(); }, [editing]);
  function commit() {
    const n = parseInt(draft.replace(/,/g,"").replace(/\s/g,""), 10);
    onSave(isNaN(n) ? null : n);
    setEditing(false);
  }
  const cls = `td-num td-editable${secTop?" sec-top":""}${bold?" bold":""}${faint?" faint":""}`;
  
  if (editing && !faint) {
    return (
      <td className={cls} style={{padding:"4px 8px"}}>
        <input ref={inputRef} value={draft}
          onChange={e => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e => { if(e.key==="Enter") commit(); if(e.key==="Escape") setEditing(false); }}
          style={{ width:"100%", border:"none", borderBottom:"2px solid #333D4B",
            outline:"none", background:"transparent", fontFamily:"inherit",
            fontSize:"13px", fontWeight:bold?"700":"400", textAlign:"center",
            fontVariantNumeric:"tabular-nums", color:"#333D4B" }} />
      </td>
    );
  }
  return (
    <td className={cls} onClick={startEdit} style={{cursor: faint ? "default" : "text"}}>
      {(value!==null&&value!==undefined) ? fmt(value) : <span className="faint">—</span>}
    </td>
  );
}

/* ─────────────────────── EditableConvNote ─────────────────────── */
function EditableConvNote({ value, onSave }) {
  const [editing, setEditing] = React.useState(false);
  const [draft,   setDraft]   = React.useState("");
  const inputRef = useRef();

  function startEdit() {
    setDraft(value !== null && value !== undefined ? String(value) : "");
    setEditing(true);
  }
  React.useEffect(() => { if (editing) inputRef.current?.select(); }, [editing]);
  function commit() {
    const raw = draft.replace(/,/g,"").replace(/\s/g,"").replace(/₩/g,"");
    const n = parseInt(raw, 10);
    onSave(isNaN(n) ? null : n);
    setEditing(false);
  }

  if (editing) {
    return (
      <td className="td-note td-editable" style={{verticalAlign:"middle"}}>
        <div style={{fontSize:"12px", color:"#8B95A1", marginBottom:"5px"}}>고유 발송 수 대비</div>
        <div style={{display:"flex", alignItems:"center", justifyContent:"center", gap:"2px"}}>
          <span style={{fontSize:"12px", color:"#8B95A1", fontWeight:"700", flexShrink:0}}>₩</span>
          <input
            ref={inputRef}
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={e => { if(e.key==="Enter") commit(); if(e.key==="Escape") setEditing(false); }}
            style={{
              width:"88px", border:"none", borderBottom:"2px solid #333D4B",
              outline:"none", background:"transparent", fontFamily:"inherit",
              fontSize:"12px", textAlign:"center",
              fontVariantNumeric:"tabular-nums", color:"#333D4B"
            }}
          />
        </div>
      </td>
    );
  }

  return (
    <td className="td-note td-editable" onClick={startEdit} style={{verticalAlign:"middle"}}>
      <div style={{fontSize:"12px", color:"#8B95A1", marginBottom:"5px"}}>고유 발송 수 대비</div>
      <div style={{
        fontSize:"12px",
        fontWeight: value != null ? "700" : "400",
        color: value != null ? "#333D4B" : "#C4C9D0"
      }}>
        {value != null ? `₩ ${fmt(value)}` : "₩ —"}
      </div>
    </td>
  );
}

/* ─────────────────────── ReportTable ─────────────────────── */
const DASH = <span className="faint">—</span>;

function ReportTable({ data, onDataChange }) {
  const delivered    = data.delivered ?? data.totalSent;
  const uniqueOpens  = data.opens?.unique;
  const uniqueClicks = data.clicks?.unique;
  const calcTotalSent   = (delivered!=null && data.bounces?.total!=null) ? delivered+data.bounces.total : data.totalSent;
  const calcDidNotOpen  = data.didNotOpen!=null ? data.didNotOpen : (delivered!=null && uniqueOpens!=null ? delivered-uniqueOpens : null);
  const calcDidNotClick = data.didNotClick!=null ? data.didNotClick : (delivered!=null && uniqueClicks!=null ? delivered-uniqueClicks : null);

  const bounceRate = calcRate(data.bounces?.total, calcTotalSent);
  const hardRate   = calcRate(data.bounces?.hard,  data.bounces?.total);
  const blockRate  = calcRate(data.bounces?.block, data.bounces?.total);
  const softRate   = calcRate(data.bounces?.soft,  data.bounces?.total);

  function update(path, val) {
    const keys = path.split(".");
    const next = JSON.parse(JSON.stringify(data));
    let ref = next;
    for (let i=0; i<keys.length-1; i++) ref = ref[keys[i]];
    ref[keys[keys.length-1]] = val;
    onDataChange(next);
  }

  const Cat  = ({children,rowSpan,secTop}) => <td rowSpan={rowSpan} className={`td-cat${secTop?" sec-top":""}`}>{children}</td>;
  const Lbl  = ({children,indent,secTop}) => <td className={`${indent?"td-lbl-i":"td-lbl"}${secTop?" sec-top":""}`}>{children}</td>;
  const Num  = ({n,bold,faint,secTop}) => <td className={`td-num${secTop?" sec-top":""}${bold?" bold":""}${faint?" faint":""}`}>{(n!==null&&n!==undefined)?fmt(n):DASH}</td>;
  const Rate = ({rate,secTop}) => <td className={`td-rate${secTop?" sec-top":""}`} style={{color:rate?"#333D4B":"#C4C9D0"}}>{rate||"—"}</td>;
  const Note = ({children,rowSpan,secTop}) => <td rowSpan={rowSpan||1} className={`td-note${secTop?" sec-top":""}`}>{children||""}</td>;
  const EN   = (props) => <EditableNum {...props} />;

  return (
    <div style={{background:"#fff",borderRadius:"20px",overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,0.07)"}}>
      <table className="rtable">
        <colgroup>
          <col style={{width:"9%"}}/><col style={{width:"28%"}}/>
          <col style={{width:"13%"}}/><col style={{width:"13%"}}/>
          <col style={{width:"14%"}}/><col style={{width:"23%"}}/>
        </colgroup>
        <thead>
          <tr>
            <th>분류</th><th>항목</th><th>전체 수</th>
            <th>고유 수</th><th>비율</th><th>비고</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <Cat rowSpan={6}>요약</Cat>
            <Lbl>총 발송 건수</Lbl>
            <Num n={calcTotalSent} bold/><Num faint/><Rate/><Note/>
          </tr>
          <tr>
            <Lbl>총 전송 성공 건수 (Delivery)</Lbl>
            <EN value={delivered} bold onSave={v=>update("delivered",v)}/>
            <EN value={null} onSave={()=>{}} faint/>
            <Rate rate={data.deliveryRate?data.deliveryRate.toFixed(2)+"%":calcRate(delivered,calcTotalSent)}/>
            <Note/>
          </tr>
          <tr>
            <Lbl><strong>반송 (Bounces) 총 건수</strong></Lbl>
            <EN value={data.bounces?.total} bold onSave={v=>update("bounces.total",v)}/>
            <EN value={null} onSave={()=>{}} faint/>
            <Rate rate={bounceRate}/><Note/>
          </tr>
          {[
            {label:"하드 바운스",  path:"bounces.hard",  n:data.bounces?.hard,  rate:hardRate},
            {label:"블록 바운스",  path:"bounces.block", n:data.bounces?.block, rate:blockRate},
            {label:"소프트 바운스",path:"bounces.soft",  n:data.bounces?.soft,  rate:softRate},
          ].map(({label,path,n,rate},i)=>(
            <tr key={i}>
              <Lbl indent>{label}</Lbl>
              <EN value={n} onSave={v=>update(path,v)}/>
              <EN value={null} onSave={()=>{}} faint/>
              <Rate rate={rate}/><Note/>
            </tr>
          ))}

          <tr>
            <Cat rowSpan={4} secTop>활동 지표</Cat>
            <Lbl secTop>오픈 (Opens)</Lbl>
            <EN value={data.opens?.total} bold secTop onSave={v=>update("opens.total",v)}/>
            <EN value={data.opens?.unique} secTop onSave={v=>update("opens.unique",v)}/>
            <Rate rate={calcRate(data.opens?.unique,delivered)} secTop/>
            <Note secTop>고유 발송 수 대비</Note>
          </tr>
          <tr>
            <Lbl>클릭 (Clicks)</Lbl>
            <EN value={data.clicks?.total} bold onSave={v=>update("clicks.total",v)}/>
            <EN value={data.clicks?.unique} onSave={v=>update("clicks.unique",v)}/>
            <Rate rate={calcRate(data.clicks?.unique,uniqueOpens)}/>
            <Note>고유 오픈 수 대비</Note>
          </tr>
          <tr>
            <Lbl>전환 (Conversions)</Lbl>
            <EN value={null} onSave={()=>{}} faint/>
            <EN value={data.conversions?.unique ?? data.conversions?.total} bold onSave={v=>update("conversions.unique",v)}/>
            <Rate rate={calcRate(data.conversions?.unique??data.conversions?.total, delivered, 3)}/>
            <EditableConvNote value={data.conversionAmount} onSave={v=>update("conversionAmount",v)}/>
          </tr>
          <tr>
            <Lbl>구독 취소 (Unsubscribes)</Lbl>
            <EN value={null} onSave={()=>{}} faint/>
            <EN value={data.unsubscribes?.unique} bold onSave={v=>update("unsubscribes.unique",v)}/>
            <Rate rate={calcRate(data.unsubscribes?.unique, delivered, 3)}/>
            <Note rowSpan={3}>고유 발송 수 대비</Note>
          </tr>

          <tr>
            <Cat rowSpan={2} secTop>미참여</Cat>
            <Lbl secTop>오픈하지 않은 고객 (Did Not Open)</Lbl>
            <EN value={null} secTop onSave={()=>{}} faint/>
            <EN value={calcDidNotOpen} bold secTop onSave={v=>{
              if(delivered!=null&&v!=null) update("opens.unique",delivered-v);
              else update("didNotOpen",v);
            }}/>
            <Rate rate={calcRate(calcDidNotOpen,delivered)} secTop/>
          </tr>
          <tr>
            <Lbl>클릭하지 않은 고객 (Did Not Click)</Lbl>
            <EN value={null} onSave={()=>{}} faint/>
            <EN value={calcDidNotClick} bold onSave={v=>{
              if(delivered!=null&&v!=null) update("clicks.unique",delivered-v);
              else update("didNotClick",v);
            }}/>
            <Rate rate={calcRate(calcDidNotClick,delivered)}/>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

/* ─────────────────────── PasteModal (Drag & Drop 추가) ─────────────────────── */
function PasteModal({ onClose, onSubmit }) {
  const [text, setText] = useState("");
  const [isDragging, setIsDragging] = useState(false);
  const taRef = useRef();

  useEffect(() => { taRef.current?.focus(); }, []);

  function handleSubmit() {
    if (!text.trim()) return;
    onSubmit(text.trim());
  }

  function handleDragOver(e) {
    e.preventDefault();
    setIsDragging(true);
  }

  function handleDragLeave(e) {
    e.preventDefault();
    setIsDragging(false);
  }

  function handleDrop(e) {
    e.preventDefault();
    setIsDragging(false);
    const file = e.dataTransfer.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const fileText = event.target.result;
      onSubmit(fileText.trim());
    };
    reader.readAsText(file);
  }

  return (
    <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div 
        className="modal-box"
        style={{
          border: isDragging ? "2px dashed #4F46E5" : "none",
          backgroundColor: isDragging ? "#EEF2FF" : "#fff",
          transition: "all 0.2s"
        }}
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
      >
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"18px" }}>
          <div>
            <p style={{ margin:0, fontSize:"17px", fontWeight:"800", color:"#333D4B" }}>
              데이터 붙여넣기 또는 파일 업로드
            </p>
            <p style={{ margin:"4px 0 0", fontSize:"13px", color:"#8B95A1" }}>
              텍스트를 붙여넣거나, CSV 파일을 마우스로 끌어다 놓아주세요.
            </p>
          </div>
          <button onClick={onClose}
            style={{ background:"#F2F4F6", border:"none", borderRadius:"8px",
              width:"28px", height:"28px", cursor:"pointer", flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
              stroke="#8B95A1" strokeWidth="3" strokeLinecap="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <textarea
          ref={taRef}
          className="paste-textarea"
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder={"Ctrl+V 로 텍스트를 붙여넣거나, 여기에 CSV 파일을 드래그 앤 드롭 하세요.\n\n예시 (이메일):\nTotal Sent: 65,246\nDelivery Rate: 99.635%\n\n예시 (CSV):\ngroupTag,date,successCount,...\nAT,20260403,16,..."}
          onKeyDown={e => {
            if ((e.ctrlKey||e.metaKey) && e.key==="Enter") handleSubmit();
          }}
          style={{ backgroundColor: isDragging ? "#fff" : "#FAFAFA" }}
        />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"14px" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
            <span style={{ fontSize:"11px", color:"#C4C9D0" }}>Ctrl+Enter로 바로 분석</span>
            <span style={{ fontSize:"11px", color:"#C4C9D0" }}>👩‍💻 made by. khj ✨</span>
          </div>
          <div style={{ display:"flex", gap:"8px" }}>
            <button className="retry-btn" onClick={onClose}>취소</button>
            <button className="analyze-btn" onClick={handleSubmit} disabled={!text.trim()}>
              분석하기
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────── CSV 테이블 컴포넌트 ─────────────────────── */
function CSVTable({ id, title, data, tags, selectedTags, onTagToggle }) {
  const filteredData = data.filter(d => selectedTags.includes(d.groupTag));
  
  const aggregated = filteredData.reduce((acc, curr) => {
    if (!acc[curr.date]) acc[curr.date] = { s:0, f:0, r:0, b:0 };
    acc[curr.date].s += curr.successCount;
    acc[curr.date].f += curr.validFailCount;
    acc[curr.date].r += curr.readCount;
    acc[curr.date].b += curr.button1;
    return acc;
  }, {});

  const rows = Object.entries(aggregated).sort((a,b) => b[0] - a[0]);

  const totals = rows.reduce((acc, [_, vals]) => {
    acc.s += vals.s; acc.f += vals.f; acc.r += vals.r; acc.b += vals.b;
    return acc;
  }, { s:0, f:0, r:0, b:0 });

  const copy = () => {
    const table = document.getElementById(id);
    const totalRow = table.querySelector("tr.bg-total"); 
    
    if (!totalRow) {
      alert("복사할 합계 데이터가 없습니다.");
      return;
    }

    const text = Array.from(totalRow.querySelectorAll("td"))
      .slice(1) 
      .map(td => td.innerText)
      .join("\t");

    navigator.clipboard.writeText(text).then(() => alert(`${title} 합계 수치만 복사되었습니다.`));
  };

  return (
    <div style={{ background:"#fff", padding:"24px", borderRadius:"20px", boxShadow:"0 2px 16px rgba(0,0,0,0.07)", marginBottom:"30px" }}>
      <div className="summary-header">
        <h3 className="summary-title">{title}</h3>
        <button className="copy-btn" onClick={copy}>합계행 복사하기</button>
      </div>

      <p style={{fontSize:"11px", color:"#8B95A1", marginBottom:"8px", fontWeight:"bold"}}>그룹 태그 중복 선택 (클릭하여 끄고 켬):</p>
      <div className="tag-container">
        {tags.map(tag => (
          <div 
            key={tag} 
            className={`tag-item ${selectedTags.includes(tag) ? 'active' : ''}`}
            onClick={() => onTagToggle(tag)}
          >
            {tag}
          </div>
        ))}
      </div>

      <table className="stable" id={id}>
        <thead>
          <tr><th>날짜</th><th>성공</th><th>실패</th><th>읽음</th><th>버튼클릭</th></tr>
        </thead>
        <tbody>
          {rows.map(([date, vals]) => (
            <tr key={date}>
              <td className="bg-light">{date}</td>
              <td>{fmt(vals.s)}</td><td>{fmt(vals.f)}</td><td>{fmt(vals.r)}</td><td>{fmt(vals.b)}</td>
            </tr>
          ))}
          {rows.length > 0 && (
            <tr className="bg-total">
              <td className="bg-total">전체 합계</td>
              <td className="bg-total">{fmt(totals.s)}</td>
              <td className="bg-total">{fmt(totals.f)}</td>
              <td className="bg-total">{fmt(totals.r)}</td>
              <td className="bg-total">{fmt(totals.b)}</td>
            </tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* ─────────────────────── 드롭다운 기반 세로형 상세 요약 테이블 ─────────────────────── */
function DropdownDetailTable({ id, title, data, tags }) {
  const [selectedTag, setSelectedTag] = useState(tags[0] || "");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");

  // Helper functions for Date (YYYYMMDD <-> YYYY-MM-DD)
  const formatToCSVDate = (dateStr) => dateStr.replace(/-/g, "");
  const formatToInputDate = (csvDateStr) => {
    if (!csvDateStr || csvDateStr.length !== 8) return "";
    return `${csvDateStr.slice(0,4)}-${csvDateStr.slice(4,6)}-${csvDateStr.slice(6,8)}`;
  };

  // Set default Start & End dates based on dataset
  useEffect(() => {
    if (data && data.length > 0) {
      const allDates = data.map(d => d.date.toString()).sort();
      if (allDates.length > 0) {
        setStartDate(formatToInputDate(allDates[0]));
        setEndDate(formatToInputDate(allDates[allDates.length - 1]));
      }
    }
  }, [data]);

  // 필터링 적용 (태그 + 날짜 범위)
  const filteredData = data.filter(d => {
    if (d.groupTag !== selectedTag) return false;
    
    const dDate = d.date.toString();
    const start = startDate ? formatToCSVDate(startDate) : "00000000";
    const end = endDate ? formatToCSVDate(endDate) : "99999999";
    
    return dDate >= start && dDate <= end;
  });

  let dateSet = new Set();
  let senderKeySet = new Set();
  let msgSpecSet = new Set();
  let chatBubbleSet = new Set();

  let s = 0, f_total = 0, r = 0, b1 = 0, b2 = 0, i1 = 0;

  filteredData.forEach(curr => {
    if (curr.date) dateSet.add(curr.date);
    if (curr.senderKey) senderKeySet.add(curr.senderKey);
    if (curr.messageSpec) msgSpecSet.add(curr.messageSpec);
    if (curr.chatBubbleType) chatBubbleSet.add(curr.chatBubbleType);

    if (curr.friendType === 'F') {
      s += curr.successCount;
      f_total += curr.validFailCount;
      r += curr.readCount;
      b1 += curr.button1;
      if (curr.button2) b2 += curr.button2;
      if (curr.image1) i1 += curr.image1;
    } else if (curr.friendType === 'N') {
      f_total += curr.validFailCount;
    }
  });

  const dateStr = [...dateSet].join(', ');
  const senderKeyStr = [...senderKeySet].join(', ');
  const msgSpecStr = [...msgSpecSet].join(', ');
  const chatBubbleStr = [...chatBubbleSet].join(', ');

  // 💡 날짜가 동일하면 한 번만 표기하도록 수정된 로직
  let periodLabel = "전체 기간";
  if (startDate && endDate) {
    if (startDate === endDate) {
      periodLabel = formatToCSVDate(startDate);
    } else {
      periodLabel = `${formatToCSVDate(startDate)} ~ ${formatToCSVDate(endDate)}`;
    }
  } else if (startDate) {
    periodLabel = `${formatToCSVDate(startDate)} ~`;
  } else if (endDate) {
    periodLabel = `~ ${formatToCSVDate(endDate)}`;
  }

  const headerTitle = selectedTag ? `${periodLabel} - ${selectedTag} [${senderKeyStr}]` : "선택된 데이터가 없습니다";

  // 요약 비율 계산
  const openRate = s > 0 ? ((r / s) * 100).toFixed(1) : "0.0";
  const btn1Rate = r > 0 ? ((b1 / r) * 100).toFixed(1) : "0.0";
  const img1Rate = r > 0 ? ((i1 / r) * 100).toFixed(1) : "0.0";

  return (
    <div style={{ background:"#fff", padding:"24px", borderRadius:"20px", boxShadow:"0 2px 16px rgba(0,0,0,0.07)", marginBottom:"30px" }}>
      
      {/* 필터 및 검색 옵션 박스 (캡처 대상에서 제외하기 위해 표 바깥 상단에 배치) */}
      <div data-html2canvas-ignore="true" style={{ background:"#FAFAFA", border:"1px solid #E5E8EC", borderRadius:"12px", padding:"18px", marginBottom:"20px", display:"flex", flexDirection:"column", gap:"14px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"16px" }}>
          <div style={{ width:"70px", fontSize:"13px", fontWeight:"700", color:"#333D4B" }}>그룹 태그</div>
          <select 
            value={selectedTag} 
            onChange={(e) => setSelectedTag(e.target.value)}
            style={{ flex:"1", maxWidth:"300px", padding:"8px 12px", borderRadius:"6px", border:"1px solid #C4C9D0", outline:"none", fontSize:"13px", cursor:"pointer", background:"#fff" }}
          >
            {tags.map(tag => <option key={tag} value={tag}>{tag}</option>)}
          </select>
        </div>
        
        <div style={{ display:"flex", alignItems:"center", gap:"16px" }}>
          <div style={{ width:"70px", fontSize:"13px", fontWeight:"700", color:"#333D4B" }}>기간 선택</div>
          <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
            <input 
              type="date" 
              value={startDate} 
              onChange={e => setStartDate(e.target.value)} 
              style={{ padding:"8px 12px", borderRadius:"6px", border:"1px solid #C4C9D0", outline:"none", fontSize:"13px", fontFamily:"inherit", background:"#fff" }} 
            />
            <span style={{ fontSize:"14px", color:"#8B95A1", fontWeight:"700", margin:"0 4px" }}>~</span>
            <input 
              type="date" 
              value={endDate} 
              onChange={e => setEndDate(e.target.value)} 
              style={{ padding:"8px 12px", borderRadius:"6px", border:"1px solid #C4C9D0", outline:"none", fontSize:"13px", fontFamily:"inherit", background:"#fff" }} 
            />
          </div>
        </div>
      </div>

      {/* 타이틀과 버튼 (캡처에서 완전히 제외됨) */}

/* ─────────────────────── App ─────────────────────── */
function App() {
  const [slots,      setSlots]      = useState([]);
  const [editData,   setEditData]   = useState(null);
  const [showRawId,  setShowRawId]  = useState(null);
  const [showModal,  setShowModal]  = useState(false);

  // App 레벨 입력 상태
  const [inputText, setInputText] = useState("");
  const [isMainDragging, setIsMainDragging] = useState(false);

  // CSV 관련 상태
  const [csvData, setCsvData] = useState(null);
  const [selectedTags1, setSelectedTags1] = useState([]);
  const [selectedTags2, setSelectedTags2] = useState([]);
  const [tags1, setTags1] = useState([]);
  const [tags2, setTags2] = useState([]);
  
  const [tags3, setTags3] = useState([]);

  const doneSlots  = slots.filter(s => s.parsed);
  const doneCount  = doneSlots.length;
  const canAddMore = slots.length < MAX_SLOTS;

  useEffect(() => {
    if (doneSlots.length > 0) {
      setEditData(JSON.parse(JSON.stringify(mergeReports(doneSlots.map(s => s.parsed)))));
    } else {
      setEditData(null);
    }
  }, [slots]);

  function removeSlot(id) {
    setSlots(prev => prev.filter(s => s.id !== id));
    if (showRawId === id) setShowRawId(null);
  }

  function reset() {
    setSlots([]);
    setEditData(null);
    setShowRawId(null);
  }

  function resetCSV() {
    setCsvData(null);
    setSelectedTags1([]); setSelectedTags2([]);
    setTags1([]); setTags2([]); setTags3([]);
  }

  function handleTextSubmit(rawText) {
    const csv = parseCSV(rawText);
    if (csv) {
      setCsvData(csv);

      const samsoniteTags = csv.tags.filter(tag => 
        tag.startsWith('SO') || tag.startsWith('SS') || tag.includes('-SS-') || tag.includes('TEST')
      );
      
      const atTags = csv.tags.filter(tag => 
        tag.startsWith('AT') || tag.includes('-AT-') || tag.includes('TEST')
      );

      setTags1(samsoniteTags);
      setTags2(atTags);
      setSelectedTags1(samsoniteTags.length > 0 ? [samsoniteTags[0]] : []);
      setSelectedTags2(atTags.length > 0 ? [atTags[0]] : []);
      
      setTags3(csv.tags);
    } else {
      const parsed = parseReport(rawText);
      const newSlot = { id: Date.now() + Math.random(), rawText, parsed };
      setSlots(prev => [...prev, newSlot]);
    }
    setShowModal(false);
  }

  const handleMainDragOver = (e) => {
    e.preventDefault();
    setIsMainDragging(true);
  };

  const handleMainDragLeave = (e) => {
    e.preventDefault();
    setIsMainDragging(false);
  };

  const handleMainDrop = (e) => {
    e.preventDefault();
    setIsMainDragging(false);
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      const file = e.dataTransfer.files[0];
      const reader = new FileReader();
      reader.onload = (event) => {
        const text = event.target.result;
        handleTextSubmit(text); 
      };
      reader.readAsText(file); 
    }
  };

  const toggleTag = (setter, current) => (tag) => {
    if (current.includes(tag)) setter(current.filter(t => t !== tag));
    else setter([...current, tag]);
  };

  function downloadExcel() {
    if (!editData) return;
    const d = editData;
    const delivered    = d.delivered ?? d.totalSent;
    const uniqueOpens  = d.opens?.unique;
    const uniqueClicks = d.clicks?.unique;
    const calcTotalSent   = (delivered!=null && d.bounces?.total!=null) ? delivered+d.bounces.total : d.totalSent;
    const calcDidNotOpen  = (delivered!=null && uniqueOpens!=null)  ? delivered-uniqueOpens  : d.didNotOpen;
    const calcDidNotClick = (delivered!=null && uniqueClicks!=null) ? delivered-uniqueClicks : d.didNotClick;
    const r = (n, den, dec=2) => (n!=null&&den) ? +((n/den)*100).toFixed(dec) : null;

    const rows = [
      ["분류","항목","전체 수","고유 수","비율(%)","비고"],
      ["요약","총 발송 건수",          calcTotalSent,          null, null, null],
      ["요약","총 전송 성공 건수",      delivered,              null, r(delivered,calcTotalSent,3), null],
      ["요약","반송 총 건수",           d.bounces?.total??null, null, r(d.bounces?.total,calcTotalSent), null],
      ["요약","  하드 바운스",          d.bounces?.hard??null,  null, r(d.bounces?.hard,d.bounces?.total), null],
      ["요약","  블록 바운스",          d.bounces?.block??null, null, r(d.bounces?.block,d.bounces?.total), null],
      ["요약","  소프트 바운스",        d.bounces?.soft??null,  null, r(d.bounces?.soft,d.bounces?.total), null],
      ["활동 지표","오픈 (Opens)",       d.opens?.total??null,   uniqueOpens??null,  r(uniqueOpens,delivered), "고유 발송 수 대비"],
      ["활동 지표","클릭 (Clicks)",      d.clicks?.total??null,  d.clicks?.unique??null, r(d.clicks?.unique,uniqueOpens), "고유 오픈 수 대비"],
      ["활동 지표","전환 (Conversions)", null, d.conversions?.unique??d.conversions?.total??null, r(d.conversions?.unique??d.conversions?.total,delivered,3), d.conversionAmount!=null ? `₩${d.conversionAmount.toLocaleString("ko-KR")}` : "고유 발송 수 대비"],
      ["활동 지표","구독 취소",          null, d.unsubscribes?.unique??null, r(d.unsubscribes?.unique,delivered,3), "고유 발송 수 대비"],
      ["미참여","오픈하지 않은 고객",    null, calcDidNotOpen??null,  r(calcDidNotOpen,delivered), ""],
      ["미참여","클릭하지 않은 고객",    null, calcDidNotClick??null, r(calcDidNotClick,delivered), ""],
    ];

    const f = (formula) => ({ t: 'n', f: formula });
    const fp = (formula) => ({ t: 'n', f: formula, z: '0.00%' });

    rows.push([], [], [], []);

    rows.push([
      null, null, 
      f("C2"), f("C2"), fp("C18/D18"), f("C3"), fp("F18/D18"), 
      f("C4"), fp("H18/D18"), f("C6+C7"), fp("J18/D18"), f("C5"), fp("L18/D18")
    ]);

    rows.push([], [], [], [], []);

    rows.push([
      null, null, 
      f("D8"), fp("C24/F18"), null, 
      f("C8"), fp("F24/F18"), null, 
      f("F24-C24"), fp("I24/F18")
    ]);
    rows.push([
      null, null, 
      f("D9"), fp("C25/F18"), fp("C25/C24"), 
      f("C9"), fp("F25/F18"), fp("F25/F24"), 
      f("F25-C25"), fp("I25/F18"), fp("I25/C24")
    ]);
    rows.push([
      null, null, 
      f("D10"), fp("C26/F18"), fp("C26/C24")
    ]);
    rows.push([
      null, null, 
      f("D11"), fp("C27/F18"), fp("C27/C24")
    ]);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [
      {wch:12}, {wch:32}, {wch:14}, {wch:14}, {wch:12}, {wch:18},
      {wch:12}, {wch:12}, {wch:12}, {wch:12}, {wch:12}, {wch:12}, {wch:12}
    ];
    
    const wb = XLSX.utils.book_new();
    const title = (doneCount > 1) ? `통합 성과 리포트 (${doneCount}개 합산)` : "이메일 성과 리포트";
    XLSX.utils.book_append_sheet(wb, ws, "성과 리포트");
    XLSX.writeFile(wb, `${title}.xlsx`);
  }

  const copyTableToClipboard = (tableId, skipFirstCol = false) => {
    const table = document.getElementById(tableId);
    if (!table) return;
    
    let text = "";
    const rows = table.querySelectorAll("tbody tr");
    
    rows.forEach(row => {
      let cols = Array.from(row.querySelectorAll("th, td"));
      if (skipFirstCol) {
        cols = cols.slice(1);
      }
      const rowData = cols.map(col => col.innerText).join("\t");
      text += rowData + "\n";
    });
    
    navigator.clipboard.writeText(text).then(() => {
      alert("표의 값만 복사되었습니다. 엑셀에 붙여넣으세요!");
    });
  };

  const getSummaryData = () => {
    if (!editData) return null;
    const d = editData;
    const totalSent = (d.delivered || 0) + (d.bounces?.total || 0) || d.totalSent || 0;
    const delivered = d.delivered || 0;
    const bTotal = d.bounces?.total || 0;
    const bHard = d.bounces?.hard || 0;
    const bBlock = d.bounces?.block || 0;
    const bSoft = d.bounces?.soft || 0;
    
    const oUni = d.opens?.unique || 0;
    const oTot = d.opens?.total || 0;
    const cUni = d.clicks?.unique || 0;
    const cTot = d.clicks?.total || 0;
    const vUni = d.conversions?.unique || d.conversions?.total || 0;
    const uUni = d.unsubscribes?.unique || 0;

    const rate = (n, den, dec = 2) => den ? ((n / den) * 100).toFixed(dec) + "%" : (0).toFixed(dec) + "%";
    return { totalSent, delivered, bTotal, bHard, bBlock, bSoft, oUni, oTot, cUni, cTot, vUni, uUni, rate };
  };

  const s = getSummaryData();

  const reportTitle = (() => {
    if (doneCount > 1) return `통합 성과 분석 리포트 (리포트 ${doneCount}개 합산)`;
    if (doneCount === 1) {
      const d = toKoreanDate(doneSlots[0].parsed?.publishedOn);
      return d ? `eDM 성과 분석 리포트 (${d})` : "eDM 성과 분석 리포트";
    }
    return "eDM 성과 분석 리포트";
  })();

  const emptyCount = MAX_SLOTS - slots.length - (canAddMore ? 1 : 0);

  return (
    <div style={{ minHeight:"100vh", background:"#F2F4F6", padding:"2.5rem 1.5rem" }}>
      <div style={{ maxWidth:"900px", margin:"0 auto" }}>
        
        {slots.length === 0 && !csvData && (
          <div 
            style={{
              background: isMainDragging ? "#EEF2FF" : "#fff", 
              borderRadius: "24px",
              boxShadow: "0 4px 24px rgba(0,0,0,0.08)",
              padding: "2.5rem 2rem",
              transition: "all 0.2s",
              border: isMainDragging ? "2px dashed #4F46E5" : "2px solid transparent"
            }}
            onDragOver={handleMainDragOver}
            onDragLeave={handleMainDragLeave}
            onDrop={handleMainDrop}
          >
            <div style={{ marginBottom: "20px" }}>
              <p style={{ margin:0, fontSize:"22px", fontWeight:"800", color:"#333D4B", letterSpacing:"-0.03em" }}>
                📊 GP 리포트 분석기
              </p>
              <p style={{ margin:"8px 0 0", fontSize:"15px", color:"#8B95A1", lineHeight:1.6 }}>
                eDM 리포트 텍스트를 복사, 붙여넣기 하거나 CSV 파일을 드래그 앤 드롭으로 넣어주세요<br/>
                <span style={{fontSize:"13px"}}>(이메일은 최대 3개 합산)</span>
              </p>
            </div>
            
            <textarea
              className="paste-textarea"
              value={inputText}
              onChange={e => setInputText(e.target.value)}
              placeholder={"Ctrl+V 로 텍스트를 붙여넣거나, 여기에 CSV 파일을 드래그 앤 드롭 하세요.\n\n예시 (이메일):\nTotal Sent: 65,246\nDelivery Rate: 99.635%\n\n예시 (CSV):\ngroupTag,date,successCount,...\nAT,20260403,16,..."}
              onKeyDown={e => {
                if ((e.ctrlKey||e.metaKey) && e.key==="Enter") {
                  if(inputText.trim()) {
                    handleTextSubmit(inputText.trim());
                    setInputText("");
                  }
                }
              }}
              style={{ backgroundColor: isMainDragging ? "#fff" : "#FAFAFA", minHeight: "220px" }}
            />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"14px" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
                <span style={{ fontSize:"11px", color:"#C4C9D0" }}>Ctrl+Enter로 바로 분석</span>
                <span style={{ fontSize:"11px", color:"#C4C9D0" }}>👩‍💻 made by. khj ✨</span>
              </div>
              <button 
                className="analyze-btn" 
                onClick={() => {
                  if(inputText.trim()) {
                    handleTextSubmit(inputText.trim());
                    setInputText("");
                  }
                }} 
                disabled={!inputText.trim()}
              >
                분석하기
              </button>
            </div>
          </div>
        )}

        {csvData && (
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"16px" }}>
              <p style={{ margin:0, fontSize:"18px", fontWeight:"800", color:"#333D4B" }}>카카오톡 메시지 발송 성과 분석 (CSV)</p>
              <button className="retry-btn" onClick={resetCSV}>처음으로</button>
            </div>
            
            <CSVTable 
              id="csv-table-1" 
              title={<><span style={{ color: "#2563EB" }}>쌤소나이트</span> 캠페인 발송 결과 리포트(위클리 리포트용)</>}
              data={csvData.data} 
              tags={tags1}
              selectedTags={selectedTags1} 
              onTagToggle={toggleTag(setSelectedTags1, selectedTags1)} 
            />
            <CSVTable 
              id="csv-table-2" 
              title={<><span style={{ color: "#C53030" }}>아메리칸 투어리스트</span> 캠페인 발송 결과 리포트(위클리 리포트용)</>}
              data={csvData.data} 
              tags={tags2} 
              selectedTags={selectedTags2} 
              onTagToggle={toggleTag(setSelectedTags2, selectedTags2)} 
            />
            <DropdownDetailTable 
              id="csv-table-3" 
              title={<><span style={{ color: "#CA8A04" }}>KakaoTalk</span> 캠페인 API 집계(1,2차 리포트용)</>}
              data={csvData.data} 
              tags={tags3} 
            />

            {/* 💡 새로 추가된 외부 데이터 복사 영역 */}
            <KakaoExternalReport 
              id="kakao-external-report" 
              title={<><span style={{ color: "#10B981" }}>KakaoTalk</span> CJ StatusBoard</>}
            />
          </div>
        )}

        {slots.length > 0 && !csvData && (
          <>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"16px" }}>
              <p style={{ margin:0, fontSize:"14px", fontWeight:"700", color:"#8B95A1" }}>
                리포트 목록
              </p>
              <div style={{ display:"flex", gap:"8px" }}>
                {doneCount > 0 && (
                  <button className="retry-btn" onClick={downloadExcel}
                    style={{ display:"flex", alignItems:"center", gap:"5px" }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 15v4a2 2 0 01-2-2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    엑셀 다운로드
                  </button>
                )}
                <button className="retry-btn" onClick={reset}>처음으로</button>
              </div>
            </div>

            <div style={{ display:"flex", gap:"12px", marginBottom:"22px" }}>
              {slots.map((slot, i) => (
                <SlotCard key={slot.id} slot={slot} index={i} onRemove={() => removeSlot(slot.id)}
                  showRaw={showRawId === slot.id} onToggleRaw={() => setShowRawId(showRawId === slot.id ? null : slot.id)} />
              ))}
              {canAddMore && (
                <div className="add-slot-card" onClick={() => setShowModal(true)}>
                  <div style={{ width:"36px", height:"36px", background:"#EBEBEB", borderRadius:"10px",
                    display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                      <path d="M12 5v14M5 12h14"/>
                    </svg>
                  </div>
                  <span style={{ fontSize:"12px", fontWeight:"700" }}>리포트 추가 ({slots.length}/{MAX_SLOTS})</span>
                </div>
              )}
              {Array.from({ length: Math.max(0, emptyCount) }).map((_, i) => (
                <div key={i} className="empty-slot" />
              ))}
            </div>

            {doneCount > 1 && (
              <div style={{ textAlign:"center" }}>
                <span className="sum-badge">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                    <path d="M12 5v14M5 12h14"/>
                  </svg>
                  리포트 {doneCount}개의 수치를 합산한 결과입니다
                </span>
              </div>
            )}

            {doneCount > 0 && editData && (
              <>
                <div id="main-report-capture" style={{ padding: "16px", margin: "16px -16px -8px", background: "#F2F4F6", borderRadius: "24px" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"14px" }}>
                    <h2 style={{ margin:0, fontSize:"18px", fontWeight:"800", color:"#333D4B", letterSpacing:"-0.02em", paddingLeft:"8px" }}>
                      {reportTitle}
                    </h2>
                    <button data-html2canvas-ignore="true" className="copy-btn" onClick={() => downloadImage('main-report-capture', '성과분석리포트')} style={{ display:"flex", alignItems:"center", gap:"4px", background:"#EEF2FF", color:"#4F46E5", border:"1px solid #C7D2FE" }}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>
                      </svg>
                      이미지 저장 및 복사
                    </button>
                  </div>

                  <ReportTable data={editData} onDataChange={setEditData} />
                </div>
                
                <div style={{ marginTop:"8px", paddingRight:"4px" }}>
                  <span style={{ fontSize:"11px", color:"#C4C9D0" }}>
                    숫자 셀에 커서를 올려 클릭하면 직접 수정할 수 있습니다
                  </span>
                </div>

                {s && (
                  <div className="summary-section" style={{ marginTop: "30px" }}>
                    <div className="summary-header">
                      <span className="summary-title">발송 결과</span>
                      <button className="copy-btn" onClick={() => copyTableToClipboard('table-send')}>표 복사하기</button>
                    </div>
                    <table className="stable" id="table-send">
                      <thead>
                        <tr>
                          <th>대상수</th><th>건수</th><th>비율</th>
                          <th>성공</th><th>성공률</th>
                          <th>반송</th><th>반송률</th>
                          <th>소프트+블록</th><th>소프트+블록률</th>
                          <th>하드</th><th>하드률</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td>{fmt(s.totalSent)}</td>
                          <td>{fmt(s.totalSent)}</td>
                          <td>100.00%</td>
                          <td>{fmt(s.delivered)}</td>
                          <td>{s.rate(s.delivered, s.totalSent)}</td>
                          <td>{fmt(s.bTotal)}</td>
                          <td>{s.rate(s.bTotal, s.totalSent)}</td>
                          <td>{fmt(s.bSoft + s.bBlock)}</td>
                          <td>{s.rate(s.bSoft + s.bBlock, s.totalSent)}</td>
                          <td>{fmt(s.bHard)}</td>
                          <td>{s.rate(s.bHard, s.totalSent)}</td>
                        </tr>
                      </tbody>
                    </table>

                    <div className="summary-header">
                      <span className="summary-title">반응 결과</span>
                      <button className="copy-btn" onClick={() => copyTableToClipboard('table-res', true)}>표 복사하기</button>
                    </div>
                    <table className="stable" id="table-res">
                      <thead>
                        <tr>
                          <th>항목</th><th>고유수</th><th>발송대비</th><th>오픈대비</th>
                          <th>전체수</th><th>전체발송대비</th><th>오픈대비</th>
                          <th>중복</th><th>중복발송대비</th><th>중복오픈대비</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td className="bg-light">Open</td>
                          <td>{fmt(s.oUni)}</td><td>{s.rate(s.oUni, s.delivered)}</td><td>-</td>
                          <td>{fmt(s.oTot)}</td><td>{s.rate(s.oTot, s.delivered)}</td><td>-</td>
                          <td>{fmt(s.oTot - s.oUni)}</td><td>{s.rate(s.oTot - s.oUni, s.delivered)}</td><td>-</td>
                        </tr>
                        <tr>
                          <td className="bg-light">Click</td>
                          <td>{fmt(s.cUni)}</td><td>{s.rate(s.cUni, s.delivered)}</td><td>{s.rate(s.cUni, s.oUni)}</td>
                          <td>{fmt(s.cTot)}</td><td>{s.rate(s.cTot, s.delivered)}</td><td>{s.rate(s.cTot, s.oTot)}</td>
                          <td>{fmt(s.cTot - s.cUni)}</td><td>{s.rate(s.cTot - s.cUni, s.delivered)}</td><td>{s.rate(s.cTot - s.cUni, s.oUni)}</td>
                        </tr>
                        <tr>
                          <td className="bg-light">전환</td>
                          <td>{fmt(s.vUni)}</td><td>{s.rate(s.vUni, s.delivered,3)}</td><td>{s.rate(s.vUni, s.oUni,3)}</td>
                          <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
                        </tr>
                        <tr>
                          <td className="bg-light">수신거부</td>
                          <td>{fmt(s.uUni)}</td><td>{s.rate(s.uUni, s.delivered,3)}</td><td>{s.rate(s.uUni, s.oUni,3)}</td>
                          <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                )}
              </>
            )}
          </>
        )}
      </div>

      {/* 리포트 추가(2~3번째)용 모달은 그대로 유지합니다. */}
      {showModal && <PasteModal onClose={() => setShowModal(false)} onSubmit={handleTextSubmit} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
